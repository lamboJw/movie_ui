# Nginx配置 - 电影库系统
# 部署步骤：
# 1. sudo cp movie_ui.conf /etc/nginx/sites-available/
# 2. sudo ln -s /etc/nginx/sites-available/movie_ui.conf /etc/nginx/sites-enabled/
# 3. sudo rm -f /etc/nginx/sites-enabled/default
# 4. sudo nginx -t
# 5. sudo systemctl restart nginx

server {
    listen 80;
    server_name _;

    # 日志
    access_log /var/log/nginx/movie_access.log;
    error_log /var/log/nginx/movie_error.log;

    # 前端静态文件
    location / {
        root /home/pi/movie_ui/public;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 电影封面图片
    location /disks/ {
        alias /home/pi/disks/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API请求转发到PHP
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
