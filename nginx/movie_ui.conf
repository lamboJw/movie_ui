server {
    listen 8899;
    server_name _;

    root /home/pi/movie_ui;
    index public/index.html;

    sendfile on;
    sendfile_max_chunk 1m;
    tcp_nopush on;

    # 前端静态文件
    location / {
        try_files $uri /public/$uri /public/index.html;
    }

    # API路由 - PHP via FPM
    location = /api {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/backend/index.php;
    }

    location /api/ {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/backend/index.php;
        fastcgi_param X_ACCEL_ENABLED 1;
    }

    # 内部视频文件服务（零拷贝）
    location /x-accel-video/ {
        internal;
        alias /home/pi/;
        sendfile on;
        sendfile_max_chunk 1m;
        tcp_nopush on;
        types { }
        default_type application/octet-stream;
    }

    # PHP-FPM（备用）
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # /disks 路径别名（封面图片）
    location /disks/ {
        alias /home/pi/disks/;
    }
}